name: release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-rc.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      environment: ${{ steps.meta.outputs.environment }}
    steps:
      - id: meta
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
            echo "unsupported tag format: $VERSION" >&2
            exit 1
          fi
          if [[ "$VERSION" == *-rc.* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "environment=staging" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "environment=production" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target_os: linux
            target_arch: amd64
            platform: linux-amd64
            artifact_name: linux-amd64
            apt_packages: ''
            cc: ''
          - runner: ubuntu-latest
            target_os: linux
            target_arch: arm64
            platform: linux-arm64
            artifact_name: linux-arm64
            apt_packages: 'gcc-aarch64-linux-gnu libc6-dev-arm64-cross'
            cc: aarch64-linux-gnu-gcc
          - runner: ubuntu-latest
            target_os: windows
            target_arch: amd64
            platform: windows-amd64
            artifact_name: windows-amd64
            apt_packages: 'mingw-w64'
            cc: x86_64-w64-mingw32-gcc
          - runner: macos-13
            target_os: darwin
            target_arch: amd64
            platform: darwin-amd64
            artifact_name: darwin-amd64
            apt_packages: ''
            cc: ''
          - runner: macos-14
            target_os: darwin
            target_arch: arm64
            platform: darwin-arm64
            artifact_name: darwin-arm64
            apt_packages: ''
            cc: ''
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install cross compiler
        if: runner.os == 'Linux' && matrix.apt_packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ${{ matrix.apt_packages }}
      - name: Download bundled extensions for target platform
        run: |
          chmod +x scripts/vendor-extensions.sh
          scripts/vendor-extensions.sh "${{ matrix.platform }}"
      - name: Build release bundle
        env:
          CC: ${{ matrix.cc }}
        run: |
          chmod +x scripts/build-release-target.sh
          scripts/build-release-target.sh "${{ needs.prepare.outputs.version }}" "${{ matrix.target_os }}" "${{ matrix.target_arch }}" dist
      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact_name }}
          path: dist/*
          retention-days: 30

  publish:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    environment: ${{ needs.prepare.outputs.environment }}
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
      - name: Generate CycloneDX SBOM
        run: |
          go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest
          cyclonedx-gomod app -licenses -json -output "dist/${{ needs.prepare.outputs.version }}_bom.json" ./...
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/*'
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            dist/*
